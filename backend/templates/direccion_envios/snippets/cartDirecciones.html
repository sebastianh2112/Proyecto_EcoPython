<div class="card">
  <h4 class="card-header"></h4>
  <div class="card-body">
    <h5 class="card-title">{{direccion_envio.direccion}}</h5>
    <div class="card-title">{{direccion_envio.reference}}</div>
    <div class="card-title">{{direccion_envio.postal_code}}</div>
    <div class="mt-3 d-flex justify-content-between align-items-center">
      <div>
        <a href="{% url 'update' direccion_envio.pk %}" class="btn btn-primary">Editar</a>
        {% if direccion_envio.default %}
        <span class="badge bg-success">Dirección Principal</span>
        {% else %}
        <form action="{% url 'default' direccion_envio.pk %}" method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-warning">Default</button>
        </form>
      </div>
      <div>
        <a href="{% url 'delete' direccion_envio.pk %}" class="btn btn-danger">Eliminar</a>
      </div>
      {% endif %}
    </div>
  </div>
</div>
