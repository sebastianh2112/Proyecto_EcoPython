{% extends "base.html" %}
{% block content %}
<div class="col-12 col-sm-10 col-md-6 col-lg-5">
  <div class="card shadow-sm">
    <div class="card-header bg-dark text-white text-center py-3">
      <h4 class="mb-0">Crear cuenta</h4>
    </div>
    <div class="card-body px-4 py-4">

      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
            {{ field.label }}
          </label>
          {{ field }}
          {% if field.errors %}
          <div class="invalid-feedback d-block">
            {% for error in field.errors %}{{ error }}{% endfor %}
          </div>
          {% endif %}
        </div>
        {% endfor %}

        <div class="d-grid mb-3 mt-4">
          <button type="submit" class="btn btn-dark btn-lg">Crear cuenta</button>
        </div>
      </form>

      <div class="d-grid mb-3">
        <a href="{% url 'social:begin' 'facebook' %}" class="btn btn-outline-primary">
          <i class="fab fa-facebook-f me-2"></i> Registrar con Facebook
        </a>
      </div>

      <hr />
      <p class="text-center text-muted mb-0 small">
        Ya tienes cuenta?
        <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Inicia sesion</a>
      </p>

    </div>
  </div>
</div>
{% endblock %}
